# Compila y despliega la app a GitHub Pages en cada push a main.
#
# Requisitos una sola vez en el repo:
#   1. Settings > Pages > Source: "GitHub Actions".
#   2. Settings > Secrets and variables > Actions > Secrets:
#        VITE_SUPABASE_URL
#        VITE_SUPABASE_ANON_KEY

name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verificar secrets de Supabase
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] || [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "::error::Faltan los secrets VITE_SUPABASE_URL y/o VITE_SUPABASE_ANON_KEY. Crea Repository secrets en Settings > Secrets and variables > Actions > Secrets."
            exit 1
          fi

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE: /polla_mundialista/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Fallback SPA y sin Jekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
